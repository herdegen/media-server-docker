# Tout le stack derrière Gluetun (WireGuard Mullvad)

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
    # Provider VPN piloté par preset (bascule via ./vpn-switch.sh nordvpn|mullvad)
    env_file:
      - ./vpn/active.env
    environment:
      - TZ=${TZ}
      - DOT=off
      # --- Control server (widget VPN Homepage), auth par apikey ---
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=/gluetun/auth/config.toml
    volumes:
      - ${GLUETUN_DATA}:/gluetun
    # Expose ici tous les ports des services qui sont derrière le VPN
    ports:
      - "9091:9091"  # Transmission
      - "9696:9696"  # Prowlarr
      - "8989:8989"  # Sonarr
      - "7878:7878"  # Radarr
      - "8191:8191"  # FlareSolverr (optionnel, pratique pour test)
      - "172.17.0.1:8000:8000"  # Control server gluetun (non-public, gateway docker)
    # Healthcheck natif gluetun (binaire interne, pas de wget qui s'accumule en cas de VPN down)
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${PROWLARR_CONFIG}:/config
    network_mode: "service:gluetun"
    depends_on:
      flaresolverr:
        condition: service_started
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002   # dossiers/médias créés en group-writable (775/664) -> archivage Glacier OK
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${MEDIA_TV}:/tv
      - ${MEDIA_DOWNLOADS}:/downloads
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002   # dossiers/médias créés en group-writable (775/664) -> archivage Glacier OK
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${MEDIA_MOVIES}:/movies
      - ${MEDIA_DOWNLOADS}:/downloads
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${TRANSMISSION_CONFIG}:/config
      - ${MEDIA_DOWNLOADS}:/downloads
      - ${MEDIA_WATCH}:/watch
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  media-mcp:
    build:
      context: ./media-mcp
    container_name: media-mcp
    env_file: ./media-mcp/.env
    restart: unless-stopped
    expose:
      - "18080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy

      # Service backend
      - traefik.http.services.mcp.loadbalancer.server.port=18080
      - traefik.http.services.mcp.loadbalancer.passhostheader=true

      # /health (public direct)
      - traefik.http.routers.mcp-health.rule=Host(`mcp.maxibestof.com`) && Path(`/health`)
      - traefik.http.routers.mcp-health.entrypoints=websecure
      - traefik.http.routers.mcp-health.tls.certresolver=le
      - traefik.http.routers.mcp-health.priority=1003
      - traefik.http.routers.mcp-health.service=mcp

      # well-known (public)
#      - traefik.http.routers.mcp-wk.rule=Host(`mcp.maxibestof.com`) && Path(`/.well-known/oauth-protected-resource`)
#      - traefik.http.routers.mcp-wk.entrypoints=websecure
#      - traefik.http.routers.mcp-wk.tls.certresolver=le
#      - traefik.http.routers.mcp-wk.priority=1002
#      - traefik.http.routers.mcp-wk.service=mcp

      # /mcp (public) -> strip vers /
      - traefik.http.routers.mcp-api.rule=Host(`mcp.maxibestof.com`) && PathPrefix(`/mcp`)
      - traefik.http.routers.mcp-api.entrypoints=websecure
      - traefik.http.routers.mcp-api.tls.certresolver=le
      - traefik.http.routers.mcp-api.priority=1001
#      - traefik.http.routers.mcp-api.middlewares=mcp-strip
      - traefik.http.routers.mcp-api.service=mcp

      # Strip du préfixe /mcp
#      - traefik.http.middlewares.mcp-strip.stripprefix.prefixes=/mcp
    networks:
      - traefik-proxy
    # IMPORTANT : même namespace réseau que tes apps
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Pas de "ports:" ici, c'est gluetun qui publie 8080
    # Monte facultatif si tu veux que MCP lise/écrive dans /media
    # volumes:
    #   - ${MEDIA_MOVIES}:/media/films:rw
    #   - ${MEDIA_TV}:/media/series:rw
    # Harmoniser l'UID/GID si besoin
    user: "${PUID}:${PGID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  traefik:
    image: traefik:v3
    container_name: traefik
    command:
      - --log.level=DEBUG
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${LE_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --api.dashboard=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - traefik-proxy
    restart: unless-stopped


  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    env_file: ./oauth2-proxy.env
    networks:
      - traefik-proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy

      # Router pour auth.maxibestof.com (pages d'authentification)
      - traefik.http.routers.oauth.rule=Host(`auth.maxibestof.com`)
      - traefik.http.routers.oauth.entrypoints=websecure
      - traefik.http.routers.oauth.tls.certresolver=le

      # Service oauth2-proxy
      - traefik.http.services.oauth.loadbalancer.server.port=4180
      - traefik.http.services.oauth.loadbalancer.passhostheader=true

      # --- Middleware forwardAuth réutilisable (protège home.maxibestof.com) ---
      # Adresse = racine oauth2-proxy : 302 vers GitHub si non authentifié (relayé par Traefik),
      # 202 via upstream static si authentifié. Pas besoin de middleware errors.
      - traefik.http.middlewares.oauth-auth.forwardauth.address=http://oauth2-proxy:4180/
      - traefik.http.middlewares.oauth-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.oauth-auth.forwardauth.authResponseHeaders=X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Access-Token
      # Router /oauth2/* sur home.maxibestof.com (callback + sign-in)
      - traefik.http.routers.oauth-home.rule=Host(`home.maxibestof.com`) && PathPrefix(`/oauth2/`)
      - traefik.http.routers.oauth-home.entrypoints=websecure
      - traefik.http.routers.oauth-home.tls.certresolver=le
      - traefik.http.routers.oauth-home.service=oauth
      - traefik.http.routers.oauth-home.priority=100

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=106          # groupe docker (GID hôte) comme groupe primaire -> accès socket
      - HOMEPAGE_ALLOWED_HOSTS=home.maxibestof.com
    env_file: ./homepage.env
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - traefik-proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.services.homepage.loadbalancer.server.port=3000
      - traefik.http.services.homepage.loadbalancer.passhostheader=true
      - traefik.http.routers.homepage.rule=Host(`home.maxibestof.com`)
      - traefik.http.routers.homepage.entrypoints=websecure
      - traefik.http.routers.homepage.tls.certresolver=le
      - traefik.http.routers.homepage.middlewares=oauth-auth@docker

  vpn-control:
    build:
      context: ./vpn-control
    container_name: vpn-control
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/media-stack:/srv/media-stack
      - /srv/docker/gluetun/auth/.apikey.txt:/gluetun-auth/.apikey.txt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - traefik-proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.services.vpnctl.loadbalancer.server.port=8080
      # /vpn sur home.maxibestof.com, protégé par le même OAuth, préfixe strippé
      - traefik.http.middlewares.vpn-strip.stripprefix.prefixes=/vpn
      - traefik.http.routers.vpnctl.rule=Host(`home.maxibestof.com`) && PathPrefix(`/vpn`)
      - traefik.http.routers.vpnctl.entrypoints=websecure
      - traefik.http.routers.vpnctl.tls.certresolver=le
      - traefik.http.routers.vpnctl.priority=200
      - traefik.http.routers.vpnctl.middlewares=vpn-strip@docker,oauth-auth@docker

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    pid: host
    network_mode: host
    environment:
      - TZ=${TZ}
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/media:/mnt/media:ro
    restart: unless-stopped


volumes:
  letsencrypt:

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
